<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobilidade Copastur</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      min-height: 100vh;
    }

    aside {
      width: 240px;
      background: #24304f;
      color: white;
      padding: 24px 18px;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
    }

    aside img {
      width: 100%;
      background: white;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 28px;
    }

    aside button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: none;
      border-radius: 10px;
      background: #35466f;
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-align: left;
    }

    aside button.active,
    aside button:hover {
      background: linear-gradient(90deg, #00cfd1, #0077b6);
    }

    main {
      margin-left: 240px;
      width: calc(100% - 240px);
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 25px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
      color: #24304f;
    }

    .tela { display: none; }
    .tela.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00cfd1, #0077b6);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-full {
      margin-top: 24px;
      width: 100%;
      padding: 15px;
    }

    .btn-edit {
      padding: 8px 12px;
      font-size: 13px;
    }

    .btn-cancelar {
      background: #6b7280;
      margin-top: 10px;
      width: 100%;
      display: none;
    }

    .msg {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
      text-align: center;
    }

    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    th {
      background: #24304f;
      color: white;
      padding: 12px;
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 11px;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }

    tr:hover { background: #f9fafb; }

    .upload-box {
      border: 2px dashed #00a6c8;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      background: #f8fcff;
    }

    @media (max-width: 800px) {
      body { display: block; }

      aside {
        position: relative;
        width: 100%;
        height: auto;
      }

      main {
        margin-left: 0;
        width: 100%;
        padding: 20px;
      }

      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <aside>
    <img src="logo-mobilidade.png" alt="Mobilidade Copastur">

    <button id="menuClientes" class="active" onclick="abrirTela('clientes')">Clientes</button>
    <button id="menuBase" onclick="abrirTela('base')">Base</button>
  </aside>

  <main>

    <section id="telaClientes" class="tela active">
      <div class="card">
        <h1 id="tituloForm">Cadastro de Clientes</h1>

        <form id="formCliente">
          <input type="hidden" id="linha">

          <div class="grid">
            <div>
              <label>BKO</label>
              <input type="text" id="bko" required>
            </div>

            <div>
              <label>Cliente</label>
              <input type="text" id="cliente" required>
            </div>

            <div>
              <label>Grupo</label>
              <input type="text" id="grupo">
            </div>

            <div>
              <label>CNPJ</label>
              <input type="text" id="cnpj" required>
            </div>

            <div>
              <label>Valor FEE</label>
              <input type="text" id="valorFee" required>
            </div>
          </div>

          <button class="btn-full" type="submit" id="btnSalvar">Salvar Cliente</button>
          <button class="btn-cancelar" type="button" id="btnCancelar" onclick="cancelarEdicao()">Cancelar Edição</button>

          <div id="mensagemCliente" class="msg"></div>
        </form>
      </div>

      <div class="card">
        <h2>Clientes Cadastrados</h2>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>BKO</th>
                <th>Cliente</th>
                <th>Grupo</th>
                <th>CNPJ</th>
                <th>Valor FEE</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody id="listaClientes">
              <tr><td colspan="6">Carregando clientes...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="telaBase" class="tela">
      <div class="card">
        <h1>Importar Base de Mobilidade</h1>

        <div class="upload-box">
          <p>Selecione o relatório em Excel ou CSV para alimentar a aba <b>Base</b>.</p>
          <input type="file" id="arquivoBase" accept=".xlsx,.xls,.csv">
          <button class="btn-full" onclick="importarBase()">Importar Base</button>
          <div id="mensagemBase" class="msg"></div>
        </div>
      </div>

      <div class="card">
        <h2>Prévia da Base</h2>
        <div class="table-wrap">
          <table>
            <thead id="previewHead"></thead>
            <tbody id="previewBody">
              <tr><td>Nenhum arquivo importado ainda.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIW698vVFcDXyPuwqxPDxzDTkrQ6xShQP8NsDF3hTMSABT-ed1VXn85k3CAc-8TJaDtQ/exec";

    const BASE_HEADERS = [
      "Data da Corrida", "COLABORADOR", "Email", "GRUPO", "EMPRESA", "BKO",
      "DEPARTYAMENTO", "CENTRO DE CUSTO", "PARCEIRO", "CORRIDA", "ORIGEM",
      "DESTINO", "Detalhamento da Despesa", "VALOR DA CORRIDA", "ID",
      "VALOR A SER COBRADO", "VLR FEE", "TOTAL", "RLOC", "HANDLE", "FATURA",
      "DATA EMISSÃO", "VCTO", "STATUS FATURA", "Mês Corrida", "Ano Corrida"
    ];

    const form = document.getElementById("formCliente");
    const listaClientes = document.getElementById("listaClientes");

    function abrirTela(tela) {
      document.querySelectorAll(".tela").forEach(el => el.classList.remove("active"));
      document.querySelectorAll("aside button").forEach(el => el.classList.remove("active"));

      document.getElementById("tela" + tela.charAt(0).toUpperCase() + tela.slice(1)).classList.add("active");
      document.getElementById("menu" + tela.charAt(0).toUpperCase() + tela.slice(1)).classList.add("active");
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const linha = document.getElementById("linha").value;

      const dados = {
        action: linha ? "editarCliente" : "cadastrarCliente",
        linha: linha,
        bko: document.getElementById("bko").value.trim(),
        cliente: document.getElementById("cliente").value.trim(),
        grupo: document.getElementById("grupo").value.trim(),
        cnpj: document.getElementById("cnpj").value.trim(),
        valorFee: document.getElementById("valorFee").value.trim()
      };

      try {
        const resposta = await fetch(APP_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(dados)
        });

        const retorno = await resposta.json();

        if (retorno.success) {
          mostrarMensagem("mensagemCliente", retorno.message, "success");
          form.reset();
          cancelarEdicao();
          carregarClientes();
        } else {
          mostrarMensagem("mensagemCliente", "Erro: " + retorno.message, "error");
        }

      } catch (erro) {
        mostrarMensagem("mensagemCliente", "Erro ao conectar com o Apps Script.", "error");
      }
    });

    async function carregarClientes() {
      try {
        const resposta = await fetch(APP_SCRIPT_URL + "?action=listarClientes");
        const retorno = await resposta.json();

        if (!retorno.success || !retorno.data.length) {
          listaClientes.innerHTML = `<tr><td colspan="6">Nenhum cliente cadastrado.</td></tr>`;
          return;
        }

        listaClientes.innerHTML = "";

        retorno.data.forEach(item => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${item.bko}</td>
            <td>${item.cliente}</td>
            <td>${item.grupo}</td>
            <td>${item.cnpj}</td>
            <td>${item.valorFee}</td>
            <td><button class="btn-edit" onclick='editarCliente(${JSON.stringify(item)})'>Editar</button></td>
          `;

          listaClientes.appendChild(tr);
        });

      } catch (erro) {
        listaClientes.innerHTML = `<tr><td colspan="6">Erro ao carregar clientes.</td></tr>`;
      }
    }

    function editarCliente(item) {
      document.getElementById("linha").value = item.linha;
      document.getElementById("bko").value = item.bko;
      document.getElementById("cliente").value = item.cliente;
      document.getElementById("grupo").value = item.grupo;
      document.getElementById("cnpj").value = item.cnpj;
      document.getElementById("valorFee").value = item.valorFee;

      document.getElementById("tituloForm").textContent = "Editar Cliente";
      document.getElementById("btnSalvar").textContent = "Salvar Alteração";
      document.getElementById("btnCancelar").style.display = "block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelarEdicao() {
      document.getElementById("linha").value = "";
      document.getElementById("tituloForm").textContent = "Cadastro de Clientes";
      document.getElementById("btnSalvar").textContent = "Salvar Cliente";
      document.getElementById("btnCancelar").style.display = "none";
    }

    async function importarBase() {
      const input = document.getElementById("arquivoBase");

      if (!input.files.length) {
        mostrarMensagem("mensagemBase", "Selecione um arquivo primeiro.", "error");
        return;
      }

      const file = input.files[0];
      const reader = new FileReader();

      reader.onload = async function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

          const linhas = json.map(row => {
            return BASE_HEADERS.map(header => row[header] || "");
          });

          montarPreview(linhas);

          const resposta = await fetch(APP_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "salvarBase",
              linhas: linhas
            })
          });

          const retorno = await resposta.json();

          if (retorno.success) {
            mostrarMensagem("mensagemBase", `Base importada com sucesso! Total de linhas: ${retorno.total}`, "success");
          } else {
            mostrarMensagem("mensagemBase", "Erro: " + retorno.message, "error");
          }

        } catch (erro) {
          mostrarMensagem("mensagemBase", "Erro ao importar arquivo. Verifique se as colunas estão com os nomes corretos.", "error");
        }
      };

      reader.readAsArrayBuffer(file);
    }

    function montarPreview(linhas) {
      const head = document.getElementById("previewHead");
      const body = document.getElementById("previewBody");

      head.innerHTML = `
        <tr>
          ${BASE_HEADERS.map(h => `<th>${h}</th>`).join("")}
        </tr>
      `;

      body.innerHTML = "";

      linhas.slice(0, 20).forEach(linha => {
        body.innerHTML += `
          <tr>
            ${linha.map(c => `<td>${c}</td>`).join("")}
          </tr>
        `;
      });

      if (!linhas.length) {
        body.innerHTML = `<tr><td>Nenhuma linha encontrada no arquivo.</td></tr>`;
      }
    }

    function mostrarMensagem(id, texto, tipo) {
      const msg = document.getElementById(id);
      msg.textContent = texto;
      msg.className = "msg " + tipo;
      msg.style.display = "block";

      setTimeout(() => {
        msg.style.display = "none";
      }, 5000);
    }

    carregarClientes();
  </script>

</body>
</html>
