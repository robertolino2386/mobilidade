<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobilidade Copastur</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      background: #24304f;
      padding: 22px 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .header-content {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box img {
      width: 220px;
      max-width: 100%;
      display: block;
    }

    .header-text {
      color: #ffffff;
    }

    .header-text h1 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .header-text p {
      margin: 0;
      color: #d7e1f4;
      font-size: 14px;
    }

    main {
      max-width: 1180px;
      margin: 32px auto;
      padding: 0 20px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin: 0 0 22px;
      color: #24304f;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #00a6c8;
      box-shadow: 0 0 0 3px rgba(0, 166, 200, 0.12);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: linear-gradient(90deg, #00cfd1, #0077b6);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-full {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
    }

    .btn-edit {
      padding: 8px 12px;
      font-size: 13px;
    }

    .btn-cancelar {
      width: 100%;
      margin-top: 10px;
      background: #6b7280;
      display: none;
    }

    .msg {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-weight: 700;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .table-topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .search-box {
      width: min(100%, 360px);
    }

    .counter {
      color: #4b5563;
      font-size: 14px;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }

    th {
      background: #24304f;
      color: #ffffff;
      padding: 12px;
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    footer {
      padding: 20px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }

      .table-topbar {
        align-items: stretch;
      }

      .search-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-box">
        <img src="logo-mobilidade.png" alt="Mobilidade Copastur">
      </div>
      <div class="header-text">
        <h1>Gestão de Clientes</h1>
        <p>Cadastro e manutenção dos clientes do produto Mobilidade.</p>
      </div>
    </div>
  </header>

  <main>
    <section class="card">
      <h2 id="tituloForm">Cadastro de Clientes</h2>

      <form id="formCliente">
        <input type="hidden" id="linha">

        <div class="grid">
          <div>
            <label for="bko">BKO</label>
            <input type="text" id="bko" required>
          </div>

          <div>
            <label for="cliente">Cliente</label>
            <input type="text" id="cliente" required>
          </div>

          <div>
            <label for="grupo">Grupo</label>
            <input type="text" id="grupo">
          </div>

          <div>
            <label for="cnpj">CNPJ</label>
            <input type="text" id="cnpj" required>
          </div>

          <div>
            <label for="valorFee">Valor FEE</label>
            <input type="text" id="valorFee" required>
          </div>
        </div>

        <button class="btn-full" type="submit" id="btnSalvar">Salvar Cliente</button>
        <button class="btn-cancelar" type="button" id="btnCancelar" onclick="cancelarEdicao()">Cancelar Edição</button>

        <div id="mensagemCliente" class="msg"></div>
      </form>
    </section>

    <section class="card">
      <div class="table-topbar">
        <div>
          <h2 style="margin-bottom: 8px;">Clientes Cadastrados</h2>
          <div id="contadorClientes" class="counter">Carregando clientes...</div>
        </div>

        <div class="search-box">
          <label for="filtroClientes">Pesquisar</label>
          <input type="text" id="filtroClientes" placeholder="BKO, cliente, grupo ou CNPJ" oninput="filtrarClientes()">
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>BKO</th>
              <th>Cliente</th>
              <th>Grupo</th>
              <th>CNPJ</th>
              <th>Valor FEE</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="listaClientes">
            <tr><td colspan="6">Carregando clientes...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>Desenvolvido por <strong><em>Roberto Lino</em></strong></footer>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIW698vVFcDXyPuwqxPDxzDTkrQ6xShQP8NsDF3hTMSABT-ed1VXn85k3CAc-8TJaDtQ/exec";

    const form = document.getElementById("formCliente");
    const listaClientes = document.getElementById("listaClientes");
    const btnSalvar = document.getElementById("btnSalvar");
    let clientesCache = [];

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const linha = document.getElementById("linha").value;
      const dados = {
        action: linha ? "editarCliente" : "cadastrarCliente",
        linha,
        bko: document.getElementById("bko").value.trim(),
        cliente: document.getElementById("cliente").value.trim(),
        grupo: document.getElementById("grupo").value.trim(),
        cnpj: document.getElementById("cnpj").value.trim(),
        valorFee: document.getElementById("valorFee").value.trim()
      };

      btnSalvar.disabled = true;
      btnSalvar.textContent = linha ? "Salvando alteração..." : "Salvando cliente...";

      try {
        const resposta = await fetch(APP_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(dados)
        });

        const retorno = await resposta.json();

        if (!retorno.success) {
          throw new Error(retorno.message || "Não foi possível salvar o cliente.");
        }

        mostrarMensagem("mensagemCliente", retorno.message, "success");
        form.reset();
        cancelarEdicao();
        await carregarClientes();
      } catch (erro) {
        mostrarMensagem("mensagemCliente", "Erro: " + erro.message, "error");
      } finally {
        btnSalvar.disabled = false;
        btnSalvar.textContent = document.getElementById("linha").value ? "Salvar Alteração" : "Salvar Cliente";
      }
    });

    async function carregarClientes() {
      listaClientes.innerHTML = '<tr><td colspan="6">Carregando clientes...</td></tr>';
      document.getElementById("contadorClientes").textContent = "Carregando clientes...";

      try {
        const resposta = await fetch(APP_SCRIPT_URL + "?action=listarClientes&_=" + Date.now(), {
          cache: "no-store"
        });

        const retorno = await resposta.json();

        if (!retorno.success) {
          throw new Error(retorno.message || "Não foi possível carregar os clientes.");
        }

        clientesCache = Array.isArray(retorno.data) ? retorno.data : [];
        clientesCache.sort((a, b) => String(a.cliente || "").localeCompare(String(b.cliente || ""), "pt-BR"));
        filtrarClientes();
      } catch (erro) {
        clientesCache = [];
        listaClientes.innerHTML = `<tr><td colspan="6">Erro ao carregar clientes: ${escapeHtml(erro.message)}</td></tr>`;
        document.getElementById("contadorClientes").textContent = "0 clientes";
      }
    }

    function filtrarClientes() {
      const termo = normalizarBusca(document.getElementById("filtroClientes").value);

      const filtrados = clientesCache.filter(item => {
        const conteudo = [item.bko, item.cliente, item.grupo, item.cnpj, item.valorFee]
          .map(normalizarBusca)
          .join(" ");
        return !termo || conteudo.includes(termo);
      });

      renderizarClientes(filtrados);
    }

    function renderizarClientes(clientes) {
      document.getElementById("contadorClientes").textContent = `${clientes.length} cliente${clientes.length === 1 ? "" : "s"}`;

      if (!clientes.length) {
        listaClientes.innerHTML = '<tr><td colspan="6">Nenhum cliente encontrado.</td></tr>';
        return;
      }

      listaClientes.innerHTML = clientes.map(item => `
        <tr>
          <td>${escapeHtml(item.bko)}</td>
          <td>${escapeHtml(item.cliente)}</td>
          <td>${escapeHtml(item.grupo)}</td>
          <td>${escapeHtml(item.cnpj)}</td>
          <td>${escapeHtml(item.valorFee)}</td>
          <td>
            <button class="btn-edit" type="button" onclick="editarClientePorLinha(${Number(item.linha)})">Editar</button>
          </td>
        </tr>
      `).join("");
    }

    function editarClientePorLinha(linha) {
      const item = clientesCache.find(cliente => Number(cliente.linha) === Number(linha));
      if (!item) return;

      document.getElementById("linha").value = item.linha;
      document.getElementById("bko").value = item.bko || "";
      document.getElementById("cliente").value = item.cliente || "";
      document.getElementById("grupo").value = item.grupo || "";
      document.getElementById("cnpj").value = item.cnpj || "";
      document.getElementById("valorFee").value = item.valorFee || "";

      document.getElementById("tituloForm").textContent = "Editar Cliente";
      document.getElementById("btnSalvar").textContent = "Salvar Alteração";
      document.getElementById("btnCancelar").style.display = "block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelarEdicao() {
      document.getElementById("linha").value = "";
      document.getElementById("tituloForm").textContent = "Cadastro de Clientes";
      document.getElementById("btnSalvar").textContent = "Salvar Cliente";
      document.getElementById("btnCancelar").style.display = "none";
    }

    function mostrarMensagem(id, texto, tipo) {
      const elemento = document.getElementById(id);
      elemento.textContent = texto;
      elemento.className = "msg " + tipo;
      elemento.style.display = "block";

      setTimeout(() => {
        elemento.style.display = "none";
      }, 6000);
    }

    function normalizarBusca(valor) {
      return String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function escapeHtml(valor) {
      return String(valor || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    carregarClientes();
  </script>
</body>
</html>
